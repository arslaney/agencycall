<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acente Aramaları Sistemi — Sompo</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Acente Arama">
<meta name="theme-color" content="#C8102E">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  :root{--red:#C8102E;--dark:#1A1A1A;--bg:#f4f4f5;--card:#fff;--line:#e4e4e7;--muted:#71717a;--soft:#fafafa;--green:#0a7d32}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:linear-gradient(180deg,#eef0f3 0%,#f6f6f8 240px,#f4f4f5 100%);background-attachment:fixed;color:var(--dark);line-height:1.5}
  .hidden{display:none!important}
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1A1A1A,#2d2d2d);padding:16px}
  .loginbox{background:#fff;border-radius:14px;padding:38px 34px;width:360px;max-width:100%;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .loginbox .logo{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .loginbox .dot{width:14px;height:14px;border-radius:50%;background:var(--red)}
  .loginbox h1{font-size:19px;font-weight:800}
  .loginbox .sub{font-size:12px;color:var(--muted);margin-bottom:24px}
  .loginbox label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:14px 0 5px;text-transform:uppercase;letter-spacing:.4px}
  .loginbox select,.loginbox input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit}
  .loginbox button{width:100%;margin-top:22px;padding:12px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
  .loginbox button:hover{background:#a50d26}
  .loginbox button:disabled{opacity:.6;cursor:wait}
  .loginbox .err{color:var(--red);font-size:12px;margin-top:10px;text-align:center;min-height:16px}
  .loginbox .hint{font-size:11px;color:var(--muted);margin-top:18px;text-align:center;line-height:1.6}
  header{background:linear-gradient(rgba(18,18,20,0.72),rgba(18,18,20,0.80)),url('header-bg.jpg');background-size:cover;background-position:center 42%;color:#fff;padding:42px 26px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
  header .brand{display:flex;align-items:center;gap:11px}
  header .dot{width:11px;height:11px;border-radius:50%;background:var(--red)}
  header h1{font-size:16px;font-weight:700}
  header .who{font-size:12px;color:#a1a1aa;margin-top:2px}
  header .right{display:flex;align-items:center;gap:14px}
  .badge{font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px}
  .badge.admin{background:var(--red);color:#fff}.badge.uw{background:#3f3f46;color:#fff}
  header button.logout{background:transparent;border:1px solid #52525b;color:#d4d4d8;padding:6px 13px;border-radius:6px;font-size:12px;cursor:pointer}
  .wrap{max-width:1300px;margin:0 auto;padding:20px}
  .tabs{display:flex;gap:6px;margin-bottom:18px;border-bottom:2px solid var(--line);flex-wrap:wrap}
  .tab{padding:10px 18px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
  .tab.on{color:var(--red);border-bottom-color:var(--red)}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(16,18,27,0.04),0 4px 12px rgba(16,18,27,0.03)}
  .kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--red)}
  .kpi .v{font-size:26px;font-weight:800}.kpi .l{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.4px}
  .filters{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:18px;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;align-items:end}
  .filters .f label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
  .filters select,.filters input{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;background:#fff;font-family:inherit}
  .filters .reset{padding:8px 14px;background:var(--soft);border:1px solid var(--line);border-radius:6px;font-size:12px;cursor:pointer;font-weight:600}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
  @media(max-width:880px){.grid2{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(16,18,27,0.04),0 6px 16px rgba(16,18,27,0.03)}
  .panel h2{font-size:13px;font-weight:700;padding:13px 16px;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
  .panel h2::before{content:'';width:8px;height:8px;background:var(--red);border-radius:2px}
  .panel .body{padding:8px 16px 14px}
  .bar{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px}
  .bar .name{width:42%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar .track{flex:1;background:var(--soft);border-radius:4px;height:18px;overflow:hidden}
  .bar .fill{height:100%;background:linear-gradient(90deg,var(--red),#e0364f);border-radius:4px}
  .bar .num{width:30px;text-align:right;font-weight:700}
  .insight{font-size:13px;padding:9px 12px;background:var(--soft);border-left:3px solid var(--red);border-radius:4px;margin:8px 0}
  .insight b{color:var(--red)}
  .records h2 .count{margin-left:auto;background:var(--red);color:#fff;font-size:11px;padding:2px 9px;border-radius:20px}
  .rec{border-bottom:1px solid var(--line);padding:14px 16px}.rec:last-child{border-bottom:none}
  .rec .top{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:7px}
  .tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:5px}
  .tag.bolge{background:#1A1A1A;color:#fff}.tag.uw{background:#3f3f46;color:#fff}
  .tag.tur-yeni{background:var(--red);color:#fff}.tag.tur-yen{background:var(--green);color:#fff}
  .tag.tarih{background:var(--soft);color:var(--muted);border:1px solid var(--line)}
  .tag.akis{background:#fff;color:var(--red);border:1px solid var(--red);font-family:monospace;font-size:10px}
  .rec .acente{font-weight:700;font-size:14px}.rec .kisi{font-size:12px;color:var(--muted);margin-bottom:5px}
  .rec .konu{font-size:13px;font-weight:600;margin:5px 0 3px}
  .rec .sonuc{font-size:13px;color:#3f3f46;background:var(--soft);padding:9px 11px;border-radius:6px;border:1px solid var(--line);white-space:pre-line}
  .rec .actions{margin-top:8px;display:flex;gap:8px}
  .rec .actions button{font-size:11px;padding:4px 10px;border:1px solid var(--line);background:#fff;border-radius:5px;cursor:pointer;font-weight:600}
  .rec .actions .del{color:var(--red);border-color:var(--red)}
  .rec .actions .edit{color:var(--dark)}
  .empty{padding:36px;text-align:center;color:var(--muted);font-size:14px}
  .formcard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px;margin-bottom:18px}
  .formcard h2{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .formgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
  .formgrid .full{grid-column:1/-1}
  .formgrid label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
  .formgrid input,.formgrid select,.formgrid textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:inherit}
  .formgrid textarea{min-height:70px;resize:vertical}
  .formcard .save{margin-top:14px;padding:11px 26px;background:var(--red);color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer}
  .formcard .save:hover{background:#a50d26}
  .formcard .cancel{margin-left:8px;padding:11px 20px;background:var(--soft);border:1px solid var(--line);border-radius:7px;font-size:14px;cursor:pointer}
  .uploadbar{background:var(--card);border:1px dashed var(--line);border-radius:10px;padding:16px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .uploadbar label.up{background:var(--dark);color:#fff;padding:9px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer}
  .uploadbar input[type=file]{display:none}.uploadbar .note{font-size:12px;color:var(--muted)}
  .toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .toolbar button{padding:9px 16px;border:1px solid var(--line);background:#fff;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer}
  .toolbar button.primary{background:var(--red);color:#fff;border-color:var(--red)}
  .loading{padding:40px;text-align:center;color:var(--muted)}
  table.cmp{width:100%;border-collapse:collapse;font-size:13px}
  table.cmp th{text-align:left;padding:8px 6px;border-bottom:2px solid var(--line)}
  table.cmp td{padding:9px 6px;border-bottom:1px solid var(--line)}
  footer{text-align:center;padding:18px;color:var(--muted);font-size:11px}
  /* birleşik tasarım öğeleri */
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .chip{font-size:12px;font-weight:600;padding:7px 15px;border-radius:20px;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--muted);transition:all .15s}
  .chip:hover{border-color:var(--red)}
  .chip.on{background:var(--red);color:#fff;border-color:var(--red)}
  .ringWrap{display:flex;align-items:center;gap:18px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 20px;margin-bottom:18px}
  .ringWrap svg circle.prog{transition:stroke-dashoffset 1.1s cubic-bezier(.2,.8,.2,1)}
  .kpi,.bar .fill,.rec{transition:transform .15s,box-shadow .15s,border-color .15s}
  .kpi:hover{transform:translateY(-2px);box-shadow:0 3px 10px rgba(0,0,0,.07)}
  .rec:hover{border-color:var(--red)}
  .bar .fill{width:0;transition:width .7s cubic-bezier(.2,.8,.2,1)}
  .bar.anim .fill{width:var(--w)}
</style>
</head>
<body>
<div id="login">
  <div class="loginbox">
    <div class="logo" style="flex-direction:column;align-items:flex-start;gap:12px;margin-bottom:10px"><img src="sompo-logo.png" alt="Sompo Sigorta" style="height:38px;width:auto"><h1 style="font-size:17px">Acente Aramaları</h1></div>
    <div class="sub">Sompo Sigorta · Görüşme Takip Sistemi</div>
    <label>Kullanıcı</label><select id="loginUser"><option>Yükleniyor...</option></select>
    <label>Şifre</label>
    <input type="password" id="loginPass" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button id="loginBtn" onclick="doLogin()">Giriş Yap</button>
    <div class="err" id="loginErr"></div>
    <div class="hint">Ortak şifre ile giriş yapılır.</div>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <div class="brand"><img src="sompo-logo.png" alt="Sompo" style="height:26px;width:auto;background:#fff;padding:3px 7px;border-radius:6px"><div style="border-left:1px solid #3f3f46;padding-left:11px"><h1>ACENTE ARAMALARI</h1><div class="who" id="whoami"></div></div></div>
    <div class="right"><span class="badge" id="roleBadge"></span><button class="logout" onclick="doLogout()">Çıkış</button></div>
  </header>
  <div class="wrap"><div class="tabs" id="tabs"></div><div id="view"></div></div>
  <footer>Sompo Sigorta · Endüstriyel Riskler · Veriler güvenli sunucuda saklanır</footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const AYLAR=['','Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const BOLGELER=['IST-AVR1','IST-AVR2','IST-AND1','IST-AND2','ADZ','EGE','GAB','MRM','OAB','KDZ'];
const TURLER=['Yeni İş','Yenileme','Acente Ziyareti','Genel Görüşme'];
const KONULAR=['Genel Görüşme','Yeni İş Teklifi','Yenileme Görüşmesi','Acente Ziyareti','RT Süreci / Takibi','Hasar / Dosya','Komisyon / Fiyat Pazarlığı','Tahsilat / Ödeme'];
const DURUMLAR=['Görüşüldü','Teklif Verildi','RT Yapıldı','Poliçe Bağlandı','Kaybedildi','Beklemede'];
const DURUM_RENK={'Görüşüldü':'#71717a','Teklif Verildi':'#2563eb','RT Yapıldı':'#9333ea','Poliçe Bağlandı':'#0a7d32','Kaybedildi':'#C8102E','Beklemede':'#a16207'};
const COLMAP={uw:['UW'],tarih:['TARİH','TARIH'],bolge:['BÖLGE','BOLGE'],acente:['GÖRÜŞÜLEN ACENTE'],kisi:['GÖRÜŞME YAPILAN KİŞİ'],akis:['AKIŞ NO'],tur:['YENİ İŞ - YENİLEME'],konu:['KONU'],sonuc:['SONUÇ']};
const $=id=>document.getElementById(id);const qa=s=>document.querySelectorAll(s);
let CUR=null, PASS=null, ROWS=[], USERS=[];
function esc(s){return(s||'').toString().replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function uniq(a){return[...new Set(a.filter(Boolean))].sort()}
function ayNo(t){const m=/^(\d{4})-(\d{2})/.exec(t||'');return m?parseInt(m[2],10):0}
function norm(s){return(s||'').toString().trim()}
function pick(row,keys){for(const k of keys){for(const rk in row){if(rk.trim().toUpperCase()===k.toUpperCase())return row[rk]}}return''}

async function api(action, extra={}){
  const res=await fetch('/api/db',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action,password:PASS,uw_id:CUR?CUR.id:extra.uw_id,...extra})});
  const data=await res.json();
  if(!res.ok)throw data;
  return data;
}

// load users for login dropdown (needs password? no — list of names is not secret; but our API requires pass for users action)
// So: fetch users without password via a public read — we expose only names through login action set.
async function initLogin(){
  // küçük hile: login dropdown için kullanıcıları çekmek üzere geçici, şifresiz uç yok.
  // bu yüzden kullanıcı listesini gömüyoruz (sadece isim/kod, gizli değil).
  USERS=[{"id": "mustafa.arslan", "ad": "Mustafa Arslan", "rol": "admin"}, {"id": "melek.zavalsiz", "ad": "Melek Zavalsız", "rol": "uw"}, {"id": "emine.moroglu", "ad": "Emine Moroğlu Yazıcı", "rol": "uw"}, {"id": "veysel.aydin", "ad": "Veysel Aydın", "rol": "uw"}, {"id": "ali.suren", "ad": "Ali Rıza Süren", "rol": "uw"}, {"id": "batuhan.kavraz", "ad": "Batuhan Kavraz", "rol": "uw"}, {"id": "burhan.ozer", "ad": "Burhan Özer", "rol": "uw"}, {"id": "fatma.unlu", "ad": "Fatma Nur Ünlü", "rol": "uw"}, {"id": "naime.atay", "ad": "Naime Pınar Atay", "rol": "uw"}, {"id": "raziye.gunes", "ad": "Raziye Güneş", "rol": "uw"}, {"id": "turan.gokdemir", "ad": "Turan Gökdemir", "rol": "uw"}, {"id": "yusuf.sacan", "ad": "Yusuf Sacan", "rol": "uw"}];
  $('loginUser').innerHTML=USERS.map(u=>'<option value="'+u.id+'">'+esc(u.ad)+(u.rol==='admin'?' ★':'')+'</option>').join('');
}
async function doLogin(){
  const id=$('loginUser').value,p=$('loginPass').value;
  $('loginBtn').disabled=true;$('loginErr').textContent='';
  try{
    const r=await api('login',{uw_id:id,password:p});
    CUR=r.user;PASS=p;
    sessionStorage.setItem('acur',JSON.stringify({u:CUR,p:PASS}));
    enterApp();
  }catch(e){$('loginErr').textContent=e.error||'Giriş başarısız';}
  $('loginBtn').disabled=false;
}
function doLogout(){sessionStorage.removeItem('acur');CUR=null;PASS=null;$('app').classList.add('hidden');$('login').classList.remove('hidden');$('loginPass').value='';}
async function enterApp(){
  $('login').classList.add('hidden');$('app').classList.remove('hidden');
  $('whoami').textContent=CUR.ad+(CUR.unvan?' · '+CUR.unvan:'');
  $('roleBadge').textContent=CUR.rol==='admin'?'ADMIN':'UW';
  $('roleBadge').className='badge '+(CUR.rol==='admin'?'admin':'uw');
  buildTabs();
}
function buildTabs(){
  let tabs;
  if(CUR.rol==='admin')tabs=[['benim','📋 Görüşmelerim'],['ekle','➕ Görüşme Ekle'],['ozet','📊 Genel Bakış'],['kio','🎯 KİO Takip'],['eslestir','🔗 KİO Eşleştir'],['trend','📈 Trend & Liderlik'],['hedef','🏆 Hedefler'],['kayitlar','📜 Kayıtlar'],['uwkarsi','👥 UW Karşılaştırma'],['yukle','📁 Excel Yükle'],['rapor','📤 Rapor']];
  else tabs=[['benim','📋 Görüşmelerim'],['ekle','➕ Görüşme Ekle'],['yukle','📁 Excel Yükle']];
  $('tabs').innerHTML=tabs.map((t,i)=>'<div class="tab'+(i===0?' on':'')+'" data-v="'+t[0]+'">'+t[1]+'</div>').join('');
  qa('.tab').forEach(el=>el.onclick=()=>{qa('.tab').forEach(x=>x.classList.remove('on'));el.classList.add('on');showView(el.dataset.v)});
  showView(tabs[0][0]);
}
async function loadRows(sadeceBenim){const r=await api('list',{payload:sadeceBenim?{sadece_benim:true}:{}});ROWS=r.rows.map(x=>({...x,ay:x.ay||ayNo(x.tarih)}));return ROWS;}
async function showView(v){
  const el=$('view');el.innerHTML='<div class="loading">Yükleniyor...</div>';
  try{
    if(v==='benim'){await loadRows(true);renderDashboard(false);}
    else if(v==='ozet'){await loadRows(false);renderDashboard(true);}
    else if(v==='kio'){await renderKioTakip();}
    else if(v==='eslestir'){await renderEslestir();}
    else if(v==='trend'){await renderTrend();}
    else if(v==='kayitlar'){await renderKayitlar();}
    else if(v==='hedef'){await renderHedef();}
    else if(v==='uwkarsi'){await loadRows();renderUwCompare();}
    else if(v==='rapor'){await loadRows();renderRapor();}
    else if(v==='ekle')renderForm();
    else if(v==='yukle')renderUpload();
  }catch(e){el.innerHTML='<div class="empty">Hata: '+(e.error||'bağlantı')+'</div>';}
}

let FILT={};
function renderDashboard(isAdmin){
  FILT={ay:'',bolge:'',uw:'',tur:'',acente:'',q:''};
  const ownView=(!isAdmin && document.querySelector('.tab.on')?.dataset.v==='benim');
  $('view').innerHTML=`
    ${ownView?'<div id="hedefSerit"></div>':''}
    ${isAdmin?'<div class="ringWrap" id="ringWrap"></div>':''}
    <div class="chips" id="chips"></div>
    <div class="kpis" id="kpis"></div>
    <div class="filters">
      <div class="f"><label>Ay</label><select id="fAy"></select></div>
      <div class="f"><label>Bölge</label><select id="fBolge"></select></div>
      ${isAdmin?'<div class="f"><label>UW</label><select id="fUw"></select></div>':''}
      <div class="f"><label>İş Türü</label><select id="fTur"></select></div>
      <div class="f"><label>KİO</label><select id="fKio"><option value="">Tümü</option><option value="1">Sadece KİO</option><option value="0">Liste dışı</option></select></div>
      <div class="f"><label>Durum</label><select id="fDurum"></select></div>
      <div class="f"><label>Acente</label><select id="fAcente"></select></div>
      <div class="f"><label>Ara</label><input id="fSearch" placeholder="firma, RT, OSB..."></div>
      <button class="reset" id="reset">Sıfırla</button>
    </div>
    <div class="grid2">
      <div class="panel"><h2>Aylık Dağılım</h2><div class="body" id="ayBar"></div></div>
      <div class="panel"><h2>Acente Yoğunluğu</h2><div class="body" id="acBar"></div></div>
    </div>
    <div class="grid2">
      <div class="panel"><h2>${isAdmin?'UW Dağılımı':'Bölge Dağılımı'}</h2><div class="body" id="bolBar"></div></div>
      <div class="panel"><h2>Satış Hunisi (Durum)</h2><div class="body" id="funnel"></div></div>
    </div>
    <div class="grid2">
      <div class="panel"><h2>Çıkarımlar</h2><div class="body" id="ins"></div></div>
      <div class="panel"><h2>Prim / Dönüşüm</h2><div class="body" id="primPanel"></div></div>
    </div>
    <div class="panel records"><h2>Görüşme Dökümü <span class="count" id="rc">0</span></h2><div id="recs"></div></div>`;

    cw.querySelectorAll('.chip').forEach(ch=>ch.addEventListener('click',()=>{
      cw.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));ch.classList.add('on');

async function loadHedefSerit(){
  const el=$('hedefSerit');if(!el)return;
  try{
    const now=new Date();
    const r=await api('hedef_benim',{payload:{yil:now.getFullYear(),ay:now.getMonth()+1}});
    const yuzde=r.hedef?Math.round(r.gerceklesen/r.hedef*100):0;
    const renk=yuzde>=100?'#0a7d32':(yuzde>=60?'#eab308':'#C8102E');
    const kalan=Math.max(0,r.hedef-r.gerceklesen);
    if(!r.hedef){
      el.innerHTML='<div class="insight" style="margin-bottom:14px">Bu ay için henüz arama hedefi belirlenmemiş.</div>';
      return;
    }
    el.innerHTML=`<div class="panel" style="margin-bottom:16px"><div class="body" style="padding:14px 18px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:13px;font-weight:700">${AYLAR[r.ay]} ${r.yil} Arama Hedefim</div>
        <div style="font-size:13px"><b style="color:${renk}">${r.gerceklesen}</b> / ${r.hedef} ${kalan>0?'· '+kalan+' kaldı':'· ✓ tamamlandı'}</div>
      </div>
      <div style="background:var(--soft);border-radius:6px;height:22px;overflow:hidden"><div style="height:100%;width:${Math.min(100,yuzde)}%;background:${renk};display:flex;align-items:center;justify-content:flex-end;padding-right:8px;color:#fff;font-size:11px;font-weight:700">${yuzde}%</div></div>
    </div></div>`;
  }catch(e){el.innerHTML='';}
}
function applyF(){return ROWS.filter(r=>{
  if(FILT.ay&&r.ay!==parseInt(FILT.ay,10))return false;
  if(FILT.bolge&&r.bolge!==FILT.bolge)return false;
  if(FILT.uw&&r.uw_ad!==FILT.uw)return false;
  if(FILT.tur&&r.tur!==FILT.tur)return false;
  if(FILT.acente&&r.acente!==FILT.acente)return false;
  if(FILT.kio==='1'&&!r.kio_mu)return false;
  if(FILT.kio==='0'&&r.kio_mu)return false;
  if(FILT.durum&&r.durum!==FILT.durum)return false;
  if(FILT.q){const b=((r.konu||'')+' '+(r.sonuc||'')+' '+(r.acente||'')+' '+(r.kisi||'')+' '+(r.akis||'')).toLowerCase();if(!b.includes(FILT.q))return false;}
  return true;})}
function barHTML(entries,lf){if(!entries.length)return '<div class="empty">Veri yok</div>';const mx=Math.max(1,...entries.map(e=>e[1]));const html=entries.map(e=>'<div class="bar" style="--w:'+(e[1]/mx*100)+'%"><span class="name" title="'+esc(lf(e[0]))+'">'+esc(lf(e[0]))+'</span><span class="track"><span class="fill"></span></span><span class="num">'+e[1]+'</span></div>').join('');setTimeout(()=>document.querySelectorAll('.bar:not(.anim)').forEach(b=>b.classList.add('anim')),50);return html;}
function draw(isAdmin){
  const f=applyF();
  const yeni=f.filter(r=>(r.tur||'').toLowerCase().includes('yeni iş')).length;
  const yen=f.filter(r=>(r.tur||'').toLowerCase()==='yenileme').length;
  const kioG=f.filter(r=>r.kio_mu).length;
  const kioAcente=uniq(f.filter(r=>r.kio_mu).map(r=>r.kio_kod||r.acente)).length;
  const kpis=[[f.length,'Görüşme (adet)'],[uniq(f.map(r=>r.acente)).length,'Aktif Acente'],[kioG,'KİO Görüşme (adet)'],[kioAcente,'Aranan KİO Acente'],[f.length-kioG,'Liste Dışı'],[yeni,'Yeni İş']];
  if(isAdmin)kpis.push([uniq(f.map(r=>r.uw_ad)).length,'UW']);
  $('kpis').innerHTML=kpis.map(k=>'<div class="kpi"><div class="v">'+k[0]+'</div><div class="l">'+k[1]+'</div></div>').join('');
  // KİO kapsama halkası (filtreli görüşmelerde KİO oranı)
  const rw=$('ringWrap');
  if(rw){
    const oran=f.length?Math.round(kioG/f.length*100):0;
    const cevre=2*Math.PI*42;
    rw.innerHTML='<svg width="100" height="100" viewBox="0 0 100 100" style="transform:rotate(-90deg)">'+
      '<circle cx="50" cy="50" r="42" fill="none" stroke="var(--soft)" stroke-width="9"/>'+
      '<circle class="prog" cx="50" cy="50" r="42" fill="none" stroke="var(--red)" stroke-width="9" stroke-linecap="round" stroke-dasharray="'+cevre+'" stroke-dashoffset="'+cevre+'"/></svg>'+
      '<div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--dark)">KİO Odak Oranı</div>'+
      '<div style="font-size:12px;color:var(--muted);margin-top:3px">'+kioG+' / '+f.length+' görüşme KİO acentelerine yapıldı · '+kioAcente+' ayrı acente · acente başına '+(kioAcente?Math.round(kioG/kioAcente*10)/10:0)+' görüşme</div>'+
      '<div style="font-size:28px;font-weight:800;color:var(--red);margin-top:6px" id="ringNum">%0</div></div>';
    setTimeout(()=>{
      const c=rw.querySelector('.prog');if(c)c.style.strokeDashoffset=cevre-(cevre*oran/100);
      let cur=0;const t=setInterval(()=>{cur+=Math.max(1,Math.round(oran/25));if(cur>=oran){cur=oran;clearInterval(t);}const rn=$('ringNum');if(rn)rn.textContent='%'+cur;},25);
    },100);
  }
  const aym={};f.forEach(r=>{if(r.ay>0)aym[r.ay]=(aym[r.ay]||0)+1});
  $('ayBar').innerHTML=barHTML(Object.entries(aym).map(([k,v])=>[+k,v]).sort((a,b)=>a[0]-b[0]),k=>AYLAR[k]);
  const ac={};f.forEach(r=>{if(r.acente)ac[r.acente]=(ac[r.acente]||0)+1});
  $('acBar').innerHTML=barHTML(Object.entries(ac).sort((a,b)=>b[1]-a[1]).slice(0,8),k=>k);
  if(isAdmin){const um={};f.forEach(r=>{if(r.uw_ad)um[r.uw_ad]=(um[r.uw_ad]||0)+1});$('bolBar').innerHTML=barHTML(Object.entries(um).sort((a,b)=>b[1]-a[1]),k=>k);}
  else{const bm={};f.forEach(r=>{if(r.bolge)bm[r.bolge]=(bm[r.bolge]||0)+1});$('bolBar').innerHTML=barHTML(Object.entries(bm).sort((a,b)=>b[1]-a[1]),k=>k);}
  const ins=[];const acs=Object.entries(ac).sort((a,b)=>b[1]-a[1]);
  if(acs.length)ins.push('<div class="insight">En aktif acente: <b>'+esc(acs[0][0].split(' ')[0])+'...</b> · '+acs[0][1]+' görüşme</div>');
  if(f.length){ins.push('<div class="insight">Yeni iş odaklı oran: <b>%'+Math.round(yeni/f.length*100)+'</b></div>');
    const amax=Object.entries(aym).sort((a,b)=>b[1]-a[1])[0];if(amax)ins.push('<div class="insight">En yoğun ay: <b>'+AYLAR[+amax[0]]+'</b> ('+amax[1]+')</div>');
    const wa=f.filter(r=>r.akis).length;ins.push('<div class="insight">Akış no\u0027lu görüşme: <b>'+wa+'</b></div>');}
  $('ins').innerHTML=ins.join('')||'<div class="empty">Kayıt yok</div>';
  // Satış hunisi — durum dağılımı (DURUMLAR sırasıyla)
  const dm={};f.forEach(r=>{const d=r.durum||'Görüşüldü';dm[d]=(dm[d]||0)+1});
  const funnelEntries=DURUMLAR.filter(d=>dm[d]).map(d=>[d,dm[d]]);
  const fmx=Math.max(1,...funnelEntries.map(e=>e[1]));
  if($('funnel'))$('funnel').innerHTML=funnelEntries.length?funnelEntries.map(e=>{
    const renk=DURUM_RENK[e[0]]||'#71717a';
    return '<div class="bar"><span class="name">'+esc(e[0])+'</span><span class="track"><span class="fill" style="width:'+(e[1]/fmx*100)+'%;background:'+renk+'"></span></span><span class="num">'+e[1]+'</span></div>';
  }).join(''):'<div class="empty">Veri yok</div>';
  // Prim / dönüşüm
  if($('primPanel')){
    const baglanan=f.filter(r=>r.durum==='Poliçe Bağlandı');
    const teklif=f.filter(r=>['Teklif Verildi','RT Yapıldı','Poliçe Bağlandı','Kaybedildi'].includes(r.durum)).length;
    const kayip=f.filter(r=>r.durum==='Kaybedildi').length;
    const toplamPrim=baglanan.reduce((s,r)=>s+(Number(r.prim)||0),0);

    const pi=[];
    pi.push('<div class="insight">Toplam bağlanan prim: <b>₺'+toplamPrim.toLocaleString('tr-TR')+'</b></div>');
    pi.push('<div class="insight">Bağlanan poliçe: <b>'+baglanan.length+'</b> · Kaybedilen: <b>'+kayip+'</b></div>');
    pi.push('<div class="insight">Teklif→Poliçe dönüşüm oranı: <b>%'+donusum+'</b></div>');
    $('primPanel').innerHTML=pi.join('');
  }
  $('rc').textContent=f.length;
  $('recs').innerHTML=f.length?f.slice().reverse().map(r=>{
    const benimKaydim=(r.uw_id===CUR.id);
    let tc='tag tur-yeni';if((r.tur||'').toLowerCase()==='yenileme')tc='tag tur-yen';
    const kioTag=r.kio_mu?'<span class="tag" style="background:#0a7d32;color:#fff">KİO ✓</span>':'<span class="tag" style="background:#fff;color:#a16207;border:1px solid #eab308">Liste dışı</span>';
    const dRenk=DURUM_RENK[r.durum]||'#71717a';
    const durumTag=r.durum?'<span class="tag" style="background:'+dRenk+';color:#fff">'+esc(r.durum)+'</span>':'';
    const primTag=(r.prim!=null&&r.prim!=='')?'<span class="tag" style="background:#fff;color:#0a7d32;border:1px solid #0a7d32">₺'+Number(r.prim).toLocaleString('tr-TR')+'</span>':'';
    return '<div class="rec"><div class="top">'+
      (r.tarih?'<span class="tag tarih">'+r.tarih+'</span>':'')+
      kioTag+
      durumTag+
      primTag+
      (isAdmin&&r.uw_ad?'<span class="tag uw">'+esc(r.uw_ad)+'</span>':'')+
      (r.bolge?'<span class="tag bolge">'+esc(r.bolge)+'</span>':'')+
      (r.tur?'<span class="'+tc+'">'+esc(r.tur)+'</span>':'')+
      (r.akis?'<span class="tag akis">'+esc(r.akis)+'</span>':'')+'</div>'+
      '<div class="acente" style="cursor:pointer;text-decoration:underline;text-decoration-color:var(--line);text-underline-offset:3px" title="Geçmişi gör" onclick="acenteGecmis(this.dataset.ad)" data-ad="'+esc(r.acente)+'">'+esc(r.acente)+(r.aday_kio?' <span title="KİO adayı" style="font-size:12px">⭐</span>':'')+'</div>'+
      (r.kisi?'<div class="kisi">👤 '+esc(r.kisi)+'</div>':'')+
      (r.konu?'<div class="konu">'+esc(r.konu)+'</div>':'')+
      (r.sonuc?'<div class="sonuc">'+esc(r.sonuc)+'</div>':'')+
      (benimKaydim?'<div class="actions"><button class="edit" onclick="editRec(\''+r.id+'\')">Düzenle</button><button class="del" onclick="delRec(\''+r.id+'\')">Sil</button></div>':'')+
    '</div>';}).join(''):'<div class="empty">Görüşme bulunamadı.</div>';
}

async function saveForm(){

    const k=(window._KIOBOLGE||[]).find(x=>x.kod===sel.value);

  const uwSel=isAdmin?`<div class="f" style="min-width:220px"><label style="display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px">Kayıtlar kimin adına?</label>
    <select id="xUw" style="padding:9px 11px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:inherit">${USERS.map(u=>'<option value="'+u.id+'"'+(u.id===CUR.id?' selected':'')+'>'+esc(u.ad)+'</option>').join('')}</select></div>`:'';
  $('view').innerHTML=`
    ${isAdmin?'<div class="formcard" style="display:flex;align-items:end;gap:14px;flex-wrap:wrap;margin-bottom:14px">'+uwSel+'<div class="note" style="font-size:12px;color:var(--muted);flex:1">Admin olarak başka bir UW adına toplu kayıt yükleyebilirsiniz. Önce UW seçin, sonra Excel\\u0027i yükleyin.</div></div>':''}
    <div class="uploadbar">
      <label class="up" for="xfile">📁 Excel Seç</label>
      <input type="file" id="xfile" accept=".xlsx,.xls">
      <span class="note">Kolonlar: UW · TARİH · BÖLGE · GÖRÜŞÜLEN ACENTE · GÖRÜŞME YAPILAN KİŞİ · AKIŞ NO · YENİ İŞ - YENİLEME · KONU · SONUÇ${isAdmin?' — kayıtlar seçtiğiniz UW adına eklenir':' — kayıtlar sizin adınıza eklenir'}</span>
    </div><div id="upResult"></div>`;
  $('xfile').addEventListener('change',handleUpload);
}
function handleUpload(e){
  const file=e.target.files[0];if(!file)return;
  $('upResult').innerHTML='<div class="loading">İşleniyor...</div>';
  const hedefUw=(CUR.rol==='admin'&&$('xUw'))?$('xUw').value:null;
  const rd=new FileReader();
  rd.onload=async ev=>{
    const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array',cellDates:true});
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
    const items=[];
    rows.forEach(row=>{let t=pick(row,COLMAP.tarih);if(t instanceof Date)t=t.toISOString().slice(0,10);else t=norm(t);const ac=norm(pick(row,COLMAP.acente));if(!ac)return;
      items.push({tarih:t,bolge:norm(pick(row,COLMAP.bolge)),acente:ac,kisi:norm(pick(row,COLMAP.kisi)),akis:norm(pick(row,COLMAP.akis)),tur:norm(pick(row,COLMAP.tur)),konu:norm(pick(row,COLMAP.konu)),sonuc:norm(pick(row,COLMAP.sonuc))});});
    try{const pl={items};if(hedefUw)pl.hedef_uw=hedefUw;
      const r=await api('bulk',{payload:pl});
      const adi=(USERS.find(u=>u.id===(r.hedef||hedefUw))||{}).ad||'';
      $('upResult').innerHTML='<div class="insight"><b>'+r.added+'</b> görüşme eklendi'+(adi?' ('+esc(adi)+' adına)':'')+'.</div>';}
    catch(er){$('upResult').innerHTML='<div class="empty">Hata: '+(er.error||'yükleme')+'</div>';}
  };
  rd.readAsArrayBuffer(file);
}

function renderUwCompare(){
  const uws=uniq(ROWS.map(r=>r.uw_ad));
  const rows=uws.map(u=>{const d=ROWS.filter(r=>r.uw_ad===u);return{u,t:d.length,
    yeni:d.filter(r=>(r.tur||'').toLowerCase().includes('yeni iş')).length,
    yen:d.filter(r=>(r.tur||'').toLowerCase()==='yenileme').length,
    ac:uniq(d.map(r=>r.acente)).length,akis:d.filter(r=>r.akis).length,
    aylar:uniq(d.map(r=>r.ay).filter(a=>a>0)).length};}).sort((a,b)=>b.t-a.t);
  const mx=Math.max(1,...rows.map(r=>r.t));
  $('view').innerHTML=`
    <div class="panel"><h2>UW Karşılaştırma Tablosu</h2><div class="body" style="padding:14px 16px">
      <table class="cmp"><thead><tr><th>UW</th><th>Toplam</th><th>Yeni İş</th><th>Yenileme</th><th>Acente</th><th>Akış No\u0027lu</th><th>Aktif Ay</th><th style="width:140px">Hacim</th></tr></thead>
      <tbody>${rows.map(r=>`<tr><td style="font-weight:700">${esc(r.u)}</td><td>${r.t}</td><td style="color:var(--red);font-weight:700">${r.yeni}</td><td style="color:var(--green);font-weight:700">${r.yen}</td><td>${r.ac}</td><td>${r.akis}</td><td>${r.aylar}</td><td><div style="background:var(--soft);border-radius:4px;height:16px;overflow:hidden"><div style="height:100%;width:${r.t/mx*100}%;background:linear-gradient(90deg,var(--red),#e0364f)"></div></div></td></tr>`).join('')}</tbody></table>
    </div></div>
    <div class="panel" style="margin-top:18px"><h2>Çıkarımlar</h2><div class="body">
      ${rows.length?'<div class="insight">En aktif UW: <b>'+esc(rows[0].u)+'</b> ('+rows[0].t+' görüşme)</div>':''}
      <div class="insight">Toplam ${ROWS.length} görüşme · ${uws.length} UW · ${uniq(ROWS.map(r=>r.acente)).length} farklı acente</div>
    </div></div>`;
}

      <div class="panel"><h2>KİO Acente Listesi <span style="margin-left:auto;font-size:11px;color:var(--muted)" id="kCount"></span></h2>
        <div id="kList" style="max-height:560px;overflow:auto"></div></div>

        <h2 style="border-top:1px solid var(--line)">Liste Dışı Aranan Acenteler</h2><div id="kDis"></div></div>
    </div>
    <div class="panel" style="margin-top:4px;border:1px solid #f3d391"><h2 style="background:#fff8e7;color:#a16207">🎯 Aday KİO Havuzu <span style="margin-left:auto;font-size:11px;color:var(--muted)" id="adayCount"></span></h2>
      <div style="padding:8px 16px;font-size:12px;color:var(--muted)">UW'lerin "KİO adayı olabilir" diye işaretlediği, KİO listesinde olmayan potansiyel acenteler. Olgunlaşanı gerçek KİO listesine eklemeyi değerlendirin.</div>

  window._KIO=kio;window._DIS=dis;
  // 📊 SEGMENT TABLOSU — KİO / Aday KİO / Diğer × yıllık + aylık

        <tr style="font-size:11px;color:var(--muted)"><th style="text-align:center">Acente</th><th style="text-align:center">Görüşme</th><th style="text-align:center">Ort.</th><th style="text-align:center;border-left:1px solid var(--line)">Acente</th><th style="text-align:center">Görüşme</th><th style="text-align:center;padding-right:16px">Ort.</th></tr>

        ${satir('🎯 KİO','#0a7d32',sY.kio,sA.kio)}
        ${satir('⭐ Aday KİO','#a16207',sY.aday,sA.aday)}

    <div style="padding:10px 16px 4px;font-size:12px;color:var(--muted)">💡 <b>Acente</b> = kaç ayrı acenteyle görüşüldü · <b>Görüşme</b> = toplam temas · <b>Ort.</b> = acente başına ortalama görüşme</div>`;
  }
  // ⚠️ UYARI BANDI — hiç aranmayan bölgeler ve kritik KİO'lar
  const bolgeStat={};
  kio.forEach(k=>{const b=k.sompo_bolge||'?';if(!bolgeStat[b])bolgeStat[b]={top:0,ar:0};bolgeStat[b].top++;if(k.arandi)bolgeStat[b].ar++;});
  const hicAranmayanBolge=Object.entries(bolgeStat).filter(([b,s])=>s.ar===0).sort((a,b)=>b[1].top-a[1].top);
  const eksikBolge=Object.entries(bolgeStat).filter(([b,s])=>s.ar>0 && s.ar<s.top).sort((a,b)=>(b[1].top-b[1].ar)-(a[1].top-a[1].ar));
  let uyariHtml='';

  // otomatik özet cümlesi (AI'sız, anlık)
  const toplamAranmayan=kio.filter(k=>!k.arandi).length;

  // bölge bar (aranmayan)
  const be=Object.entries(bolgeAranmadi).sort((a,b)=>b[1]-a[1]);
  const mx=Math.max(1,...be.map(e=>e[1]));
  $('kBolgeBar').innerHTML=be.length?be.map(e=>'<div class="bar"><span class="name">'+esc(e[0])+'</span><span class="track"><span class="fill" style="width:'+(e[1]/mx*100)+'%;background:linear-gradient(90deg,#a16207,#eab308)"></span></span><span class="num">'+e[1]+'</span></div>').join(''):'<div class="empty">Hepsi arandı 🎉</div>';
  // liste dışı
  $('kDis').innerHTML=dis.length?dis.sort((a,b)=>b.gorusme_sayisi-a.gorusme_sayisi).map(d=>'<div class="rec" style="padding:10px 16px"><div class="acente" style="font-size:13px">'+esc(d.acente)+'</div><div class="kisi">'+d.gorusme_sayisi+' görüşme · son: '+(d.son_gorusme||'-')+'</div></div>').join(''):'<div class="empty">Liste dışı arama yok</div>';
  const drawList=()=>{
    const fd=$('kDurum').value,fb=$('kBolge').value,fi=$('kIl').value,fs=$('kSearch').value.toLowerCase().trim();
    let l=window._KIO.filter(k=>{
      if(fd==='1'&&!k.arandi)return false;if(fd==='0'&&k.arandi)return false;
      if(fb&&k.sompo_bolge!==fb)return false;if(fi&&k.il!==fi)return false;
      if(fs&&!(k.ad||'').toLowerCase().includes(fs))return false;return true;});
    l=l.sort((a,b)=>(a.arandi-b.arandi)|| (a.ad>b.ad?1:-1));
    $('kCount').textContent=l.length+' acente';
    $('kList').innerHTML=l.length?l.map(k=>{
      const dot=k.arandi?'<span style="color:var(--green);font-weight:700">✓</span>':'<span style="color:#a16207;font-weight:700">○</span>';
      const ayRozet=k.arandi_ay?'<span class="tag" style="background:#0a7d32;color:#fff;font-size:10px;padding:1px 6px">bu ay '+k.gorusme_sayisi_ay+'</span>':(k.arandi?'<span class="tag" style="background:#fff;color:#a16207;border:1px solid #eab308;font-size:10px;padding:1px 6px">bu ay yok</span>':'');
      const info=k.arandi?(k.gorusme_sayisi+' görüşme · son '+k.son_gorusme):'henüz aranmadı';
      return '<div class="rec" style="padding:10px 16px;display:flex;align-items:center;gap:10px"><div style="font-size:16px">'+dot+'</div><div style="flex:1"><div class="acente" style="font-size:13px">'+esc(k.ad)+' '+ayRozet+'</div><div class="kisi">'+esc(k.il||'')+' · '+esc(k.sompo_bolge||'')+' · '+esc(k.hangi_brans||'')+'</div></div><div style="font-size:11px;color:var(--muted);text-align:right;min-width:90px">'+info+'</div></div>';

  ['kDurum','kBolge','kIl','kSearch'].forEach(id=>$(id).addEventListener('input',drawList));
  $('kReset').onclick=()=>{['kDurum','kBolge','kIl'].forEach(i=>$(i).value='');$('kSearch').value='';drawList()};
  window._drawListKio=drawList;
  drawList();
  // 🗺️ Gerçek Türkiye haritası (D3 + GeoJSON)
  const ilStat={};
  kio.forEach(k=>{const il=(k.il||'').trim().toUpperCase();if(!il)return;if(!ilStat[il])ilStat[il]={top:0,ar:0};ilStat[il].top++;if(k.arandi)ilStat[il].ar++;});
  cizTurkiyeHarita(ilStat);
  adayHavuzYukle();
}
async function adayHavuzYukle(){
  const box=$('adayHavuz');if(!box)return;
  box.innerHTML='<div style="padding:16px;color:var(--muted)">Yükleniyor...</div>';

  const havuz=(d.havuz||[]);
  // gerçek KİO olmuşları ayır (terfi etmiş adaylar)
  const bekleyen=havuz.filter(h=>!h.kio_mu);
  const terfi=havuz.filter(h=>h.kio_mu);
  if($('adayCount'))$('adayCount').textContent=bekleyen.length+' aday'+(terfi.length?' · '+terfi.length+' KİO oldu':'');
  if(!havuz.length){box.innerHTML='<div class="empty" style="padding:20px">Henüz aday işaretlenmemiş. Görüşme eklerken "⭐ KİO adayı olabilir" kutusunu işaretleyin.</div>';return;}
  const kart=(h,terfiMi)=>`<div class="rec" style="padding:12px 16px;display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap${terfiMi?';opacity:.7':''}">
    <div style="flex:1;min-width:220px">

      <div class="kisi">${esc(h.bolge||'')} · ${h.kez} görüşme · son: ${esc(h.son_tarih||'')} · ${esc((h.uwlar||[]).join(', '))}</div>
      ${(h.notlar&&h.notlar.length)?'<div style="font-size:12px;color:#a16207;margin-top:4px;background:#fff8e7;border-radius:6px;padding:6px 9px">'+h.notlar.map(esc).join('<br>')+'</div>':''}
    </div>
  </div>`;
  box.innerHTML=bekleyen.map(h=>kart(h,false)).join('')+(terfi.length?'<div style="padding:8px 16px;font-size:12px;color:var(--green);font-weight:600;border-top:1px solid var(--line)">✓ Aday iken gerçek KİO listesine giren acenteler:</div>'+terfi.map(h=>kart(h,true)).join(''):'');

function trNorm(s){return (s||'').toString().toLocaleUpperCase('tr-TR')
  .replace(/İ/g,'I').replace(/I/g,'I').replace(/Ş/g,'S').replace(/Ğ/g,'G').replace(/Ü/g,'U').replace(/Ö/g,'O').replace(/Ç/g,'C')
  .replace(/[^A-Z]/g,'');}
function cizTurkiyeHarita(ilStat){
  const wrap=document.getElementById('trmap');
  if(!wrap||typeof d3==='undefined')return;
  const DATA={};Object.keys(ilStat).forEach(k=>{DATA[trNorm(k)]=ilStat[k];});
  const renk=(s)=>{if(!s||!s.top)return '#e5e7eb';const o=s.ar/s.top;if(o===0)return '#C8102E';if(o>=1)return '#0a7d32';return o<0.5?'#e8821e':'#9a9b1e';};
  // önbellek: harita verisini bir kez indir
  const draw=(geo)=>{
    const w=680,h=300;
    const proj=d3.geoMercator().center([35,39]).scale(2300).translate([w/2,h/2]);
    const path=d3.geoPath().projection(proj);
    wrap.innerHTML='';
    const svg=d3.select('#trmap').append('svg').attr('viewBox','0 0 '+w+' '+h).attr('width','100%').style('background','#eef3f8').style('border-radius','12px').style('border','1px solid var(--line)');
    const tip=document.getElementById('trtip');
    svg.selectAll('path').data(geo.features).join('path')
      .attr('d',path).attr('stroke','#fff').attr('stroke-width',0.6)
      .attr('fill',d=>{const p=d.properties||{};const dd=DATA[trNorm(p.name||p.Name||p.NAME_1||p.il||'')];return renk(dd);})
      .style('cursor','pointer')
      .on('mousemove',function(ev,d){const p=d.properties||{};const ad=(p.name||p.Name||p.NAME_1||p.il||'');const dd=DATA[trNorm(ad)];if(tip){tip.style.display='block';tip.style.left=(ev.clientX+12)+'px';tip.style.top=(ev.clientY+12)+'px';tip.innerHTML=ad+(dd?(': '+dd.ar+'/'+dd.top+' arandı (%'+Math.round(dd.ar/dd.top*100)+')'):': KİO yok');}d3.select(this).attr('stroke-width',1.5).attr('stroke','#1a1a1a');})
      .on('mouseleave',function(){if(tip)tip.style.display='none';d3.select(this).attr('stroke-width',0.6).attr('stroke','#fff');})
      .on('click',function(ev,d){const p=d.properties||{};const ad=(p.name||p.Name||p.NAME_1||p.il||'');const dd=DATA[trNorm(ad)];if(dd){if($('kIl'))$('kIl').value=findIlValue(ad);if(window._drawListKio)window._drawListKio();$('kList')&&$('kList').scrollIntoView({behavior:'smooth',block:'center'});}});
  };
  if(window._TRGEO){draw(window._TRGEO);return;}
  wrap.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)">Harita yükleniyor…</div>';
  d3.json('https://cdn.jsdelivr.net/gh/alpers/Turkey-Maps-GeoJSON@master/tr-cities-utf8.json')
    .then(geo=>{window._TRGEO=geo;draw(geo);})
    .catch(e=>{wrap.innerHTML='<div style="padding:30px;text-align:center;color:var(--muted)">Harita yüklenemedi. İnternet bağlantısını kontrol edin.</div>';});
}
function findIlValue(ad){
  // kIl select'inde eşleşen değeri bul (Türkçe il adı)
  const sel=document.getElementById('kIl');if(!sel)return '';
  const n=trNorm(ad);
  for(const o of sel.options){if(trNorm(o.value)===n)return o.value;}
  return '';
}

async function renderTrend(){
  $('view').innerHTML='<div class="loading">Trend verileri hesaplanıyor...</div>';
  let d;try{d=await api('trend');}catch(e){$('view').innerHTML='<div class="empty">Hata: '+(e.error||'')+'</div>';return;}
  const aylik=d.aylik||{},lider=d.liderlik||[];
  const AYISIM=['','Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
  const aylar=Object.keys(aylik).sort();
  const sonAylar=aylar.slice(-6);
  const buAy=sonAylar[sonAylar.length-1],oncekiAy=sonAylar[sonAylar.length-2];

  const degisim=onV?Math.round((buV-onV)/onV*100):0;
  const mx=Math.max(1,...sonAylar.map(a=>aylik[a]));

  $('view').innerHTML=`
    <div class="kpis">

      <div class="kpi"><div class="v" style="color:${degisim>=0?'var(--green)':'var(--red)'}">${degisim>=0?'▲ +':'▼ '}${degisim}%</div><div class="l">Önceki Aya Göre</div></div>

    <div class="panel"><h2>🏆 UW Liderlik Tablosu</h2><div class="body" style="padding:8px 0">
      <table class="cmp" style="width:100%"><thead><tr><th style="padding-left:16px">#</th><th>UW</th><th>Görüşme</th><th>KİO</th><th>Teklif</th><th>Poliçe</th><th>Dönüşüm</th><th style="padding-right:16px">Prim</th></tr></thead>
      <tbody>${lider.map((u,i)=>{
        const madalya=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
        return `<tr>
          <td style="padding-left:16px;font-weight:700">${madalya}</td>
          <td style="font-weight:700">${esc(u.ad)}</td>
          <td>${u.gorusme}</td>
          <td style="color:var(--green)">${u.kio}</td>
          <td>${u.teklif}</td>
          <td style="font-weight:700">${u.police}</td>
          <td style="font-weight:700;color:${u.donusum>=40?'var(--green)':u.donusum>=20?'#a16207':'var(--red)'}">%${u.donusum}</td>
          <td style="padding-right:16px;color:var(--green)">₺${u.prim.toLocaleString('tr-TR')}</td>
        </tr>`;}).join('')}</tbody></table>
    </div></div>`;
  $('trendBar').innerHTML=sonAylar.map(a=>{
    const v=aylik[a];
    return '<div class="bar" style="--w:'+(v/mx*100)+'%"><span class="name">'+fmtAy(a)+'</span><span class="track"><span class="fill"></span></span><span class="num">'+v+'</span></div>';
  }).join('')||'<div class="empty">Veri yok</div>';
  setTimeout(()=>document.querySelectorAll('.bar:not(.anim)').forEach(b=>b.classList.add('anim')),50);
}

  const liste=data.liste||[];
  const toplamHedef=liste.reduce((s,u)=>s+u.hedef,0);
  const toplamGerc=liste.reduce((s,u)=>s+u.gerceklesen,0);
  const yillar=[now.getFullYear()-1,now.getFullYear(),now.getFullYear()+1];
  $('view').innerHTML=`
    <div class="filters" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr))">
      <div class="f"><label>Yıl</label><select id="hYil">${yillar.map(y=>'<option'+(y===data.yil?' selected':'')+'>'+y+'</option>').join('')}</select></div>
      <div class="f"><label>Ay</label><select id="hAy">${AYLAR.slice(1).map((a,i)=>'<option value="'+(i+1)+'"'+((i+1)===data.ay?' selected':'')+'>'+a+'</option>').join('')}</select></div>
      <div class="f" style="align-self:end"><button class="reset" id="hKaydet" style="background:var(--red);color:#fff;border-color:var(--red)">💾 Hedefleri Kaydet</button></div>
      <div class="f" style="align-self:end"><span id="hMsg" style="font-size:13px;color:var(--green);font-weight:600"></span></div>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="v">${toplamHedef}</div><div class="l">Toplam Hedef (${AYLAR[data.ay]})</div></div>
      <div class="kpi"><div class="v" style="color:var(--green)">${toplamGerc}</div><div class="l">Gerçekleşen</div></div>
      <div class="kpi"><div class="v">%${toplamHedef?Math.round(toplamGerc/toplamHedef*100):0}</div><div class="l">Genel İlerleme</div></div>
    </div>
    <div class="panel"><h2>UW Aylık Arama Hedefleri — ${AYLAR[data.ay]} ${data.yil}</h2><div class="body" style="padding:14px 16px">
      <table class="cmp"><thead><tr><th>UW</th><th style="width:110px">Hedef</th><th>Gerçekleşen</th><th style="width:200px">İlerleme</th><th style="width:70px">%</th></tr></thead>
      <tbody>${liste.map(u=>{
        const yuzde=u.hedef?Math.round(u.gerceklesen/u.hedef*100):0;
        const renk=yuzde>=100?'#0a7d32':(yuzde>=60?'#eab308':'#C8102E');
        return `<tr>
          <td style="font-weight:700">${esc(u.ad)}${u.rol==='admin'?' ★':''}</td>
          <td><input type="number" min="0" class="hInput" data-uw="${u.uw_id}" value="${u.hedef}" style="width:80px;padding:5px 8px;border:1px solid var(--line);border-radius:5px;font-size:13px"></td>
          <td style="font-weight:700;color:var(--green)">${u.gerceklesen}</td>
          <td><div style="background:var(--soft);border-radius:4px;height:16px;overflow:hidden"><div style="height:100%;width:${Math.min(100,yuzde)}%;background:${renk}"></div></div></td>
          <td style="font-weight:700;color:${renk}">${yuzde}%</td>
        </tr>`;}).join('')}</tbody></table>
    </div></div>`;
  const reload=()=>{window._HY=parseInt($('hYil').value,10);window._HA=parseInt($('hAy').value,10);renderHedef();};
  $('hYil').addEventListener('change',reload);
  $('hAy').addEventListener('change',reload);
  $('hKaydet').onclick=async()=>{
    $('hKaydet').disabled=true;$('hMsg').textContent='Kaydediliyor...';
    try{
      const inputs=[...document.querySelectorAll('.hInput')];
      for(const inp of inputs){
        await api('hedef_set',{payload:{yil:window._HY,ay:window._HA,uw_id_hedef:inp.dataset.uw,hedef:parseInt(inp.value,10)||0}});
      }
      $('hMsg').textContent='✓ Kaydedildi';
    }catch(e){$('hMsg').textContent='Hata: '+(e.error||'');}
    $('hKaydet').disabled=false;setTimeout(()=>{if($('hMsg'))$('hMsg').textContent='';},2500);
  };
}

function renderRapor(){
  $('view').innerHTML=`
    <div class="formcard"><h2>📤 Rapor Çıktısı</h2>
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Tüm görüşme verisini dışa aktar.</p>
      <div class="toolbar">
        <button class="primary" onclick="exportXlsx()">⬇ Görüşmeler (.xlsx)</button>
        <button onclick="exportCsv()">⬇ CSV</button>
        <button onclick="exportKio()">⬇ KİO Takip Listesi</button>
        <button onclick="printRapor()">🖨 Yazdır / PDF</button>
      </div>
      <div class="insight">Toplam <b>${ROWS.length}</b> kayıt · <b>${uniq(ROWS.map(r=>r.uw_ad)).length}</b> UW</div>
    </div>
    <div class="formcard">
      <h2>🧠 AI Yönetsel Özet</h2>
      <p style="font-size:13px;color:var(--muted);margin-bottom:12px">Tüm görüşme verisini yapay zekâ analiz edip yönetsel değerlendirme yazar. Birkaç saniye sürebilir.</p>
      <button class="save" id="aiBtn" onclick="aiOzet()">✨ Özet Çıkar</button>
      <div id="aiSonuc" style="margin-top:16px"></div>
    </div>`;
}
async function aiOzet(){
  $('aiBtn').disabled=true;
  $('aiSonuc').innerHTML='<div class="loading">Yapay zekâ veriyi analiz ediyor...</div>';
  try{
    const r=await api('ai_ozet');
    const html=esc(r.ozet).replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
    $('aiSonuc').innerHTML='<div style="background:var(--soft);border:1px solid var(--line);border-left:3px solid var(--red);border-radius:8px;padding:16px 18px;font-size:14px;line-height:1.7"><p>'+html+'</p></div>';
  }catch(e){
    $('aiSonuc').innerHTML='<div class="empty">Hata: '+(e.error||'')+(e.detail?' — API anahtarı Vercel\\u0027e eklendi mi?':'')+'</div>';
  }
  $('aiBtn').disabled=false;
}
function expRows(){return ROWS.map(r=>({'UW':r.uw_ad,'TARİH':r.tarih,'BÖLGE':r.bolge,'GÖRÜŞÜLEN ACENTE':r.acente,'KİO':r.kio_mu?'Evet':'Hayır','GÖRÜŞME YAPILAN KİŞİ':r.kisi,'AKIŞ NO':r.akis,'YENİ İŞ - YENİLEME':r.tur,'DURUM':r.durum,'PRİM':r.prim!=null?r.prim:'','KONU':r.konu,'SONUÇ':r.sonuc}))}
function exportXlsx(){const ws=XLSX.utils.json_to_sheet(expRows());const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'ARAMALAR');XLSX.writeFile(wb,'acente_aramalar_export.xlsx');}
function exportCsv(){const ws=XLSX.utils.json_to_sheet(expRows());const csv=XLSX.utils.sheet_to_csv(ws);const b=new Blob(['\ufeff'+csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='acente_aramalar.csv';a.click();}
function printRapor(){
  const f=ROWS.slice().sort((a,b)=>(a.tarih||'').localeCompare(b.tarih||''));
  const bugun=new Date().toLocaleDateString('tr-TR');
  const kioG=f.filter(r=>r.kio_mu).length;
  const rowsHtml=f.map(r=>`<tr>
    <td>${r.tarih||''}</td><td>${esc(r.uw_ad||'')}</td><td>${esc(r.bolge||'')}</td>
    <td><b>${esc(r.acente||'')}</b>${r.kio_mu?' <span style="color:#0a7d32">●KİO</span>':' <span style="color:#a16207">○</span>'}</td>
    <td>${esc(r.kisi||'')}</td><td>${esc(r.tur||'')}</td><td>${esc(r.akis||'')}</td>
    <td>${esc(r.konu||'')}</td><td style="font-size:9px">${esc(r.sonuc||'')}</td></tr>`).join('');
  const html=`<!DOCTYPE html><html lang="tr"><head><meta charset="utf-8"><title>Acente Aramaları Raporu</title>
    <style>
      *{font-family:-apple-system,Arial,sans-serif}
      body{margin:24px;color:#1A1A1A}
      .hdr{border-bottom:3px solid #C8102E;padding-bottom:10px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:flex-end}
      .hdr h1{font-size:18px;margin:0}.hdr .s{font-size:11px;color:#666}
      .meta{font-size:11px;color:#444;margin-bottom:12px}
      .meta b{color:#C8102E}
      table{width:100%;border-collapse:collapse;font-size:10px}
      th{background:#1A1A1A;color:#fff;padding:6px 5px;text-align:left;font-size:10px}
      td{padding:5px;border-bottom:1px solid #ddd;vertical-align:top}
      tr:nth-child(even){background:#f7f7f7}
      @media print{.noprint{display:none}}
    </style></head><body>
    <div class="hdr"><div><h1>ACENTE ARAMALARI RAPORU</h1><div class="s">Sompo Sigorta · Endüstriyel Riskler (Yangın)</div></div><div class="s">${bugun}</div></div>
    <div class="meta">Toplam <b>${f.length}</b> görüşme · <b>${kioG}</b> KİO · <b>${f.length-kioG}</b> liste dışı · <b>${uniq(f.map(r=>r.acente)).length}</b> farklı acente · <b>${uniq(f.map(r=>r.uw_ad)).length}</b> UW</div>
    <table><thead><tr><th>Tarih</th><th>UW</th><th>Bölge</th><th>Acente</th><th>Kişi</th><th>Tür</th><th>Akış No</th><th>Konu</th><th>Sonuç</th></tr></thead><tbody>${rowsHtml}</tbody></table>
    <p class="noprint" style="margin-top:16px;font-size:12px;color:#666">Yazdırma penceresi açılıyor… Çıkmazsa Ctrl/Cmd+P ile yazdırıp "PDF olarak kaydet" seçin.</p>
    <script>window.onload=()=>setTimeout(()=>window.print(),400)<\/script>
    </body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();
}
async function exportKio(){
  try{const d=await api('kio_durum');
    const rows=(d.kio||[]).map(k=>({'KİO ACENTE':k.ad,'İL':k.il,'SOMPO BÖLGE':k.sompo_bolge,'BRANŞ':k.hangi_brans,'DURUM':k.arandi?'Arandı':'Aranmadı','GÖRÜŞME SAYISI':k.gorusme_sayisi,'SON GÖRÜŞME':k.son_gorusme||''}));
    const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'KIO_TAKIP');XLSX.writeFile(wb,'kio_takip_listesi.xlsx');
  }catch(e){alert(e.error||'Hata')}
}

// boot
initLogin();
const sc=sessionStorage.getItem('acur');
if(sc){try{const o=JSON.parse(sc);CUR=o.u;PASS=o.p;enterApp();}catch(e){}}

// PWA — service worker kaydı
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});
}
// PWA — "Uygulamayı Yükle" butonu
let _deferredPrompt=null;
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();_deferredPrompt=e;showInstallBtn();
});
window.addEventListener('appinstalled',()=>{_deferredPrompt=null;const b=document.getElementById('installBtn');if(b)b.remove();});
function showInstallBtn(){
  if(document.getElementById('installBtn'))return;
  const b=document.createElement('button');
  b.id='installBtn';
  b.textContent='⬇️ Uygulamayı Yükle';
  b.style.cssText='position:fixed;right:18px;bottom:18px;z-index:9999;background:var(--red);color:#fff;border:none;padding:12px 18px;border-radius:24px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(200,16,46,.4)';
  b.onclick=async()=>{
    if(!_deferredPrompt)return;
    _deferredPrompt.prompt();
    const r=await _deferredPrompt.userChoice;
    if(r.outcome==='accepted'){b.remove();}
    _deferredPrompt=null;
  };
  document.body.appendChild(b);
}
</script>
</body>
